# Prism (GPU Model Placement) — Prompt Caching Column Reordering Optimization
# Usage: skydiscover-run initial_program.py evaluator.py -c config.yaml -s <strategy>
language: python
diff_based_generation: true
max_iterations: 100
checkpoint_interval: 5
max_solution_length: 60000

llm:                                                                                                                                                         
    models:                                                                                                                                                    
      - name: "gpt-5"          # your Azure deployment name                                                                                                    
        api_base: "https://lesley-prospector.openai.azure.com/openai/v1"                                                                   
        api_key: "${AZURE_API_KEY}"                                                                                                                            
        weight: 1.0                                                                                                                                            
    temperature: 0.99                                                                                                                                          
    top_p: 0.99                                                                                                                                                
    max_tokens: 32000                                                                                                                                        
    timeout: 600

prompt:
  system_message: |-
    You are an expert for model placement on GPUs. 
    Your task is to improve a model placement algorithm by improve the function named compute_model_placement in the intial program that places models to available GPUs.
    You can be as creative as you want as long as you optimize the given metric, be diverse and innovative. 
    The algorithm must MINIMIZE the maximum KVPR across all GPUs while ensuring models can fit into the GPUs' memory.
    Note that KVPR is KV cache pressure for a GPU. It indicates how crowded a GPU is. For a specific GPU, its KVPR is computed as sum(model.req_rate/model.slo for model in models) / (GPU_MEM_SIZE - sum(model.model_size for model in models)), where models are the models on this GPU. The generated program should be as simple as possible and the code should be executed correctly without errors.

evaluator:
  timeout: 360

